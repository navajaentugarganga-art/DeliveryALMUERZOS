<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Almuerzos</title>
    <style>
        body {
            font-family: 'Arial', sans-serif; 
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #f7f8f8, #e9e9e9);
        }
        header {
            background: linear-gradient(90deg, #4e54c8, #8f94fb);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: background 0.5s ease;
        }
        header:hover {
            background: linear-gradient(90deg, #8f94fb, #4e54c8);
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin: 20px;
            padding: 15px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        .btn {
            background: #4e54c8;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #8f94fb;
        }
        footer {
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Delivery Almuerzos</h1>
        <p>Your place for delicious meals!</p>
    </header>
    <div class="cards">
        <div class="card">
            <h2>Meal of the Day</h2>
            <p>Enjoy our special meal crafted just for you!</p>
            <button class="btn">Order Now</button>
        </div>
        <div class="card">
            <h2>Custom Meals</h2>
            <p>Create your meal with our easy meal builder!</p>
            <button class="btn">Build Your Meal</button>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Delivery Almuerzos</p>
    </footer>
</body>
</html>
